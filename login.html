<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet Login</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f7ff;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
width:100%;
max-width:420px;
background:white;
border-radius:12px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
color:#2b6cff;
}

.tagline{
text-align:center;
color:#777;
margin-bottom:25px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2b6cff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1f53d3;
}

.switch{
text-align:center;
margin-top:15px;
cursor:pointer;
color:#2b6cff;
font-size:14px;
}

.hidden{
display:none;
}

.error{
color:red;
font-size:13px;
text-align:center;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">RHF Wallet</div>
<div class="tagline">Secure Digital Wallet</div>

<div id="error" class="error"></div>

<!-- LOGIN FORM -->

<div id="loginForm">

<input id="loginPhone" placeholder="Phone Number">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="showRegister()">Create Account</div>

</div>

<!-- REGISTER FORM -->

<div id="registerForm" class="hidden">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<select id="accountType">
<option value="Wallet">E-Wallet</option>
<option value="Bank">Bank</option>
</select>

<input id="password" type="password" placeholder="Password">
<input id="confirmPassword" type="password" placeholder="Confirm Password">

<button onclick="register()">Create Account</button>

<div class="switch" onclick="showLogin()">Back to Login</div>

</div>

</div>

<!-- Firebase SDK -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
projectId: "rhf-shop-mafia-8d2e5",
storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
messagingSenderId: "158711184948",
appId: "1:158711184948:web:9223f07fa6658601189461",
measurementId: "G-R6KN1EYMB3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.showRegister = function(){
document.getElementById("loginForm").classList.add("hidden")
document.getElementById("registerForm").classList.remove("hidden")
}

window.showLogin = function(){
document.getElementById("registerForm").classList.add("hidden")
document.getElementById("loginForm").classList.remove("hidden")
}

window.register = function(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value
let confirm=document.getElementById("confirmPassword").value
let accountType=document.getElementById("accountType").value

if(password!==confirm){
document.getElementById("error").innerText="Passwords do not match"
return
}

createUserWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

const user=userCredential.user

set(ref(db,"users/"+user.uid),{

name:name,
phone:phone,
email:email,
balance:0,
cardClass:"Standard",
accountType:accountType

})

alert("Account created successfully")

showLogin()

})

.catch((error)=>{
document.getElementById("error").innerText=error.message
})

}

window.login = function(){

let phone=document.getElementById("loginPhone").value
let password=document.getElementById("loginPassword").value

let fakeEmail=phone+"@rhf.app"

signInWithEmailAndPassword(auth,fakeEmail,password)

.then(()=>{
window.location.href="index.html"
})

.catch(()=>{
document.getElementById("error").innerText="Login failed"
})

}

</script>

</body>
</html>
