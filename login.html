<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet - Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-attachment: fixed;
  }
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 2rem;
    padding: 40px 30px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .btn-login {
    height: 80px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  .btn-login:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<div class="card">
  <h1 class="text-white text-3xl font-bold mb-8">RHF WALLET</h1>

  <button onclick="openLogin()" class="btn-login w-full bg-gradient-to-r from-blue-500 to-indigo-500 text-white mb-5">LOGIN / DAFTAR BANK</button>
  <button onclick="openLogin()" class="btn-login w-full bg-gradient-to-r from-emerald-500 to-green-500 text-white mb-8">LOGIN / DAFTAR E-WALLET</button>

  <div id="login-form" class="hidden text-left mt-6">
    <h2 class="text-white text-xl font-semibold mb-4">Masuk</h2>
    <p class="text-white text-sm mb-2">Nomor Kartu / Nomor HP</p>
    <input type="tel" id="login-card" placeholder="Contoh: 123456789101112" class="w-full mb-3 px-4 py-3 rounded-xl text-black text-lg">
    <p class="text-white text-sm mb-2">PIN / Password (6 digit angka)</p>
    <input type="password" id="login-pin" placeholder="●●●●●●" maxlength="6" class="w-full mb-4 px-4 py-3 rounded-xl text-black text-lg">
    <button onclick="login()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-semibold">Masuk</button>
    <p id="login-error" class="text-red-400 text-sm mt-2 hidden"></p>
  </div>
</div>

<script>
let adminCard = "123456789101112"; // default kartu admin pertama kali
let adminPin = "848586";           // PIN rahasia admin

function openLogin() {
  document.getElementById('login-form').classList.remove('hidden');
}

function login() {
  const card = document.getElementById('login-card').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const error = document.getElementById('login-error');

  if (!card || !pin) {
    error.textContent = "Semua field harus diisi";
    error.classList.remove('hidden');
    return;
  }
  if (!/^\d{6}$/.test(pin)) {
    error.textContent = "PIN harus berupa 6 digit angka";
    error.classList.remove('hidden');
    return;
  }
  error.classList.add('hidden');

  // Cek login admin
  if (card === adminCard && pin === adminPin) {
    // Redirect ke admin panel
    window.location.href = "admin.html?adminCard=" + adminCard;
    return;
  }

  // User biasa → redirect ke dashboard
  window.location.href = "index.html";
}
</script>

</body>
</html>
