<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Inter', sans-serif; background: linear-gradient(to right, #4f46e5, #3b82f6); }
.login-card { max-width: 400px; margin: 6rem auto; background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div class="login-card">
  <h2 class="text-2xl font-bold text-center text-gray-700 mb-6">RHF Wallet Login</h2>

  <!-- USER LOGIN / REGISTER -->
  <div class="flex flex-col gap-4 mb-6">
    <button onclick="window.location.href='register-bank.html'" 
            class="h-20 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg">LOGIN / DAFTAR BANK</button>
    <button onclick="window.location.href='register-wallet.html'" 
            class="h-20 rounded-2xl bg-green-600 hover:bg-green-700 text-white font-bold text-lg">LOGIN / DAFTAR E-WALLET</button>
  </div>

  <hr class="my-4">

  <!-- ADMIN LOGIN -->
  <h3 class="text-lg font-semibold text-gray-700 mb-4">Login Admin</h3>
  <form id="adminLoginForm">
    <label class="block mb-2 text-gray-600">Email Admin</label>
    <input type="email" id="adminEmail" value="gacoruncek73@gmail.com" readonly
           class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-4 text-gray-700" />

    <label class="block mb-2 text-gray-600">PIN Admin</label>
    <input type="password" id="adminPin" placeholder="6 digit angka" maxlength="6"
           class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-6 text-gray-700" />

    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-semibold">Login Admin</button>
  </form>

  <p id="error" class="text-red-500 text-sm mt-4 hidden"></p>
</div>

<script>
  // ==========================
  // ADMIN CONFIG
  // ==========================
  const ADMIN_EMAIL = "gacoruncek73@gmail.com";
  let ADMIN_PIN = "123456"; // PIN default, akan diganti tiap 2 jam

  // Generate PIN baru tiap 2 jam, hanya admin
  setInterval(() => {
    ADMIN_PIN = Math.floor(100000 + Math.random() * 900000).toString();
    console.log("PIN admin baru (2 jam):", ADMIN_PIN);
    // Hanya logout admin session (jika ada)
    if(sessionStorage.getItem("admin_logged_in") === "true"){
        alert("PIN admin baru telah diterbitkan. Sesi admin lama logout.");
        sessionStorage.removeItem("admin_logged_in");
    }
  }, 2 * 60 * 60 * 1000); // 2 jam

  // ==========================
  // ADMIN LOGIN
  // ==========================
  document.getElementById("adminLoginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const email = document.getElementById("adminEmail").value;
    const pin = document.getElementById("adminPin").value;
    const pinRegex = /^[0-9]{6}$/;

    if(!pinRegex.test(pin)){
      showError("PIN hanya boleh angka dan harus 6 digit");
      return;
    }

    if(email === ADMIN_EMAIL && pin === ADMIN_PIN){
      sessionStorage.setItem("admin_logged_in","true");
      alert("Login Admin berhasil!");
      window.location.href = "admin.html";
    } else {
      showError("PIN salah atau email tidak sesuai");
    }
  });

  function showError(msg){
    const el = document.getElementById("error");
    el.textContent = msg;
    el.classList.remove("hidden");
  }
</script>

</body>
</html>
