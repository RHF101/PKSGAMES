<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet - Login/Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom right, #4f46e5, #3b82f6);
    min-height: 100vh;
}
.card {
    background: white;
    border-radius: 2rem;
    padding: 2rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.btn {
    @apply w-full py-5 rounded-xl text-lg font-bold text-white shadow-lg mb-4;
}
</style>
</head>
<body class="flex items-center justify-center p-4">

<div class="w-full max-w-md">
    <div class="text-center mb-8 text-white">
        <h1 class="text-3xl font-bold mb-2">RHF WALLET</h1>
        <p>Login atau Registrasi</p>
    </div>

    <!-- Empat tombol -->
    <div class="mb-6 space-y-3">
        <button id="btn-login-wallet" class="btn bg-blue-600 hover:bg-blue-700">Login E-Wallet</button>
        <button id="btn-login-bank" class="btn bg-green-600 hover:bg-green-700">Login Bank</button>
        <button id="btn-register-wallet" class="btn bg-indigo-600 hover:bg-indigo-700">Register E-Wallet</button>
        <button id="btn-register-bank" class="btn bg-teal-600 hover:bg-teal-700">Register Bank</button>
    </div>

    <!-- Form Area -->
    <div class="card" id="form-area">
        <p class="text-center text-gray-500">Pilih opsi di atas</p>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
  authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
  databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
  projectId: "rhf-shop-mafia-8d2e5",
  storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
  messagingSenderId: "158711184948",
  appId: "1:158711184948:web:9223f07fa6658601189461",
  measurementId: "G-R6KN1EYMB3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const formArea = document.getElementById('form-area');

// Helper to show form
function showForm(type){
    if(type==='login-wallet'){
        formArea.innerHTML = `
            <h2 class="text-xl font-semibold mb-4">Login E-Wallet</h2>
            <input type="tel" id="wallet-phone" placeholder="Nomor HP" class="w-full border rounded-xl p-3 mb-3">
            <input type="password" id="wallet-pin" placeholder="PIN 6 digit" class="w-full border rounded-xl p-3 mb-4">
            <button id="submit-login-wallet" class="w-full bg-blue-600 text-white py-3 rounded-xl">Login</button>
        `;
        document.getElementById('submit-login-wallet').onclick = loginWallet;
    }
    else if(type==='login-bank'){
        formArea.innerHTML = `
            <h2 class="text-xl font-semibold mb-4">Login Bank</h2>
            <input type="text" id="bank-card" placeholder="Nomor Kartu" class="w-full border rounded-xl p-3 mb-3">
            <input type="password" id="bank-pin" placeholder="PIN 6 digit" class="w-full border rounded-xl p-3 mb-4">
            <button id="submit-login-bank" class="w-full bg-green-600 text-white py-3 rounded-xl">Login</button>
        `;
        document.getElementById('submit-login-bank').onclick = loginBank;
    }
    else if(type==='register-wallet'){
        formArea.innerHTML = `
            <h2 class="text-xl font-semibold mb-4">Register E-Wallet</h2>
            <input type="text" id="reg-wallet-name" placeholder="Nama Lengkap" class="w-full border rounded-xl p-3 mb-3">
            <input type="tel" id="reg-wallet-phone" placeholder="Nomor HP" class="w-full border rounded-xl p-3 mb-3">
            <input type="password" id="reg-wallet-pin" placeholder="PIN 6 digit" class="w-full border rounded-xl p-3 mb-3">
            <input type="password" id="reg-wallet-pin2" placeholder="Konfirmasi PIN" class="w-full border rounded-xl p-3 mb-4">
            <button id="submit-register-wallet" class="w-full bg-indigo-600 text-white py-3 rounded-xl">Register</button>
        `;
        document.getElementById('submit-register-wallet').onclick = registerWallet;
    }
    else if(type==='register-bank'){
        formArea.innerHTML = `
            <h2 class="text-xl font-semibold mb-4">Register Bank</h2>
            <input type="text" id="reg-bank-name" placeholder="Nama Lengkap" class="w-full border rounded-xl p-3 mb-2">
            <input type="tel" id="reg-bank-phone" placeholder="Nomor HP" class="w-full border rounded-xl p-3 mb-2">
            <input type="email" id="reg-bank-email" placeholder="Email" class="w-full border rounded-xl p-3 mb-2">
            <input type="text" id="reg-bank-nik" placeholder="NIK KTP" class="w-full border rounded-xl p-3 mb-2">
            <input type="text" id="reg-bank-kk" placeholder="Nomor KK" class="w-full border rounded-xl p-3 mb-2">
            <input type="password" id="reg-bank-pin" placeholder="PIN 6 digit" class="w-full border rounded-xl p-3 mb-2">
            <input type="password" id="reg-bank-pin2" placeholder="Konfirmasi PIN" class="w-full border rounded-xl p-3 mb-4">
            <button id="submit-register-bank" class="w-full bg-teal-600 text-white py-3 rounded-xl">Register</button>
        `;
        document.getElementById('submit-register-bank').onclick = registerBank;
    }
}

// Button events
document.getElementById('btn-login-wallet').onclick = ()=>showForm('login-wallet');
document.getElementById('btn-login-bank').onclick = ()=>showForm('login-bank');
document.getElementById('btn-register-wallet').onclick = ()=>showForm('register-wallet');
document.getElementById('btn-register-bank').onclick = ()=>showForm('register-bank');

// Functions
function loginWallet(){
    const phone = document.getElementById('wallet-phone').value.trim();
    const pin = document.getElementById('wallet-pin').value.trim();
    if(!/^\d{6}$/.test(pin)){
        alert("PIN harus 6 digit angka");
        return;
    }
    get(child(ref(db), `users`)).then(snapshot=>{
        const users = snapshot.val();
        const found = Object.values(users||{}).find(u=>u.phone===phone && u.pin===pin);
        if(found){
            alert("Login berhasil!");
            localStorage.setItem('user', JSON.stringify(found));
            window.location.href = "index.html";
        }else{
            alert("Nomor HP atau PIN salah");
        }
    });
}

function loginBank(){
    const card = document.getElementById('bank-card').value.trim();
    const pin = document.getElementById('bank-pin').value.trim();
    if(!/^\d{6}$/.test(pin)){
        alert("PIN harus 6 digit angka");
        return;
    }
    get(child(ref(db), `bank_users`)).then(snapshot=>{
        const users = snapshot.val();
        const found = Object.values(users||{}).find(u=>u.card===card && u.pin===pin);
        if(found){
            alert("Login berhasil!");
            localStorage.setItem('user', JSON.stringify(found));
            window.location.href = "index.html";
        }else{
            alert("Nomor kartu atau PIN salah");
        }
    });
}

function registerWallet(){
    const name = document.getElementById('reg-wallet-name').value.trim();
    const phone = document.getElementById('reg-wallet-phone').value.trim();
    const pin = document.getElementById('reg-wallet-pin').value.trim();
    const pin2 = document.getElementById('reg-wallet-pin2').value.trim();
    if(name.length<3){ alert("Nama minimal 3 karakter"); return; }
    if(!/^\d{6}$/.test(pin)){ alert("PIN harus 6 digit angka"); return; }
    if(pin!==pin2){ alert("Konfirmasi PIN tidak cocok"); return; }

    get(child(ref(db), `users`)).then(snapshot=>{
        const users = snapshot.val();
        const exists = Object.values(users||{}).some(u=>u.phone===phone);
        if(exists){ alert("Nomor sudah terdaftar"); return; }

        const uid = Date.now().toString();
        set(ref(db, `users/${uid}`), { name, phone, pin, type:'wallet', balance:0, created_at:new Date().toISOString()})
        .then(()=>{ alert("Registrasi berhasil"); showForm('login-wallet'); });
    });
}

function registerBank(){
    const name = document.getElementById('reg-bank-name').value.trim();
    const phone = document.getElementById('reg-bank-phone').value.trim();
    const email = document.getElementById('reg-bank-email').value.trim();
    const nik = document.getElementById('reg-bank-nik').value.trim();
    const kk = document.getElementById('reg-bank-kk').value.trim();
    const pin = document.getElementById('reg-bank-pin').value.trim();
    const pin2 = document.getElementById('reg-bank-pin2').value.trim();

    if(name.length<3){ alert("Nama minimal 3 karakter"); return; }
    if(!/^\d{16}$/.test(nik)){ alert("NIK harus 16 digit angka"); return; }
    if(!/^\d{16}$/.test(kk)){ alert("Nomor KK harus 16 digit angka"); return; }
    if(!/^\d{6}$/.test(pin)){ alert("PIN harus 6 digit angka"); return; }
    if(pin!==pin2){ alert("Konfirmasi PIN tidak cocok"); return; }

    get(child(ref(db), `bank_users`)).then(snapshot=>{
        const users = snapshot.val();
        const existsPhone = Object.values(users||{}).some(u=>u.phone===phone);
        const existsNIK = Object.values(users||{}).some(u=>u.nik===nik);
        if(existsPhone){ alert("Nomor sudah terdaftar"); return; }
        if(existsNIK){ alert("NIK sudah terdaftar"); return; }

        const uid = Date.now().toString();
        set(ref(db, `bank_users/${uid}`), { name, phone, email, nik, kk, pin, balance:0, verified:false, created_at:new Date().toISOString()})
        .then(()=>{ alert("Registrasi Bank berhasil"); showForm('login-bank'); });
    });
}
</script>
</body>
</html>
