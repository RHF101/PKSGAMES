<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet - Login & Registrasi</title>
<script type="module">
  // Import Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.2.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/10.2.0/firebase-database.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.2.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
    authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
    databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
    projectId: "rhf-shop-mafia-8d2e5",
    storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
    messagingSenderId: "158711184948",
    appId: "1:158711184948:web:9223f07fa6658601189461",
    measurementId: "G-R6KN1EYMB3"

  window.firebaseDB = db;

</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-attachment: fixed;
}
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 2rem;
    padding: 30px 25px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    text-align: center;
}
button { transition: all 0.3s ease; }
button:hover { transform: translateY(-2px); }
.hidden { display: none; }
input:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
label { color: white; font-weight: 500; display: block; margin-bottom: 5px; }
input { width: 100%; padding: 12px 15px; border-radius: 12px; border: none; margin-bottom: 15px; }
h2 { color: white; margin-bottom: 15px; }
.error { color: #f87171; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="card">
    <h1 class="text-white text-3xl font-bold mb-6">RHF WALLET</h1>

    <div id="main-options" class="space-y-4">
        <button onclick="showForm('walletForm')" class="w-full h-16 bg-blue-600 text-white rounded-xl font-bold text-lg">Login / Daftar E-Wallet</button>
        <button onclick="showForm('bankForm')" class="w-full h-16 bg-green-600 text-white rounded-xl font-bold text-lg">Login / Daftar Bank</button>
    </div>

    <!-- E-Wallet -->
    <div id="walletForm" class="hidden">
        <h2>E-Wallet</h2>
        <div class="error" id="wallet-error"></div>
        <input type="text" id="wName" placeholder="Nama Lengkap">
        <input type="tel" id="wPhone" placeholder="Nomor HP (+62 / 08)">
        <input type="password" id="wPin" placeholder="PIN 6 Digit">
        <input type="password" id="wPin2" placeholder="Konfirmasi PIN">
        <button onclick="registerWallet()" class="w-full h-14 bg-blue-500 text-white rounded-xl font-bold">Daftar</button>
        <button onclick="loginWallet()" class="w-full h-14 bg-blue-700 text-white rounded-xl font-bold mt-2">Login</button>
        <button onclick="backMain()" class="w-full h-12 text-white mt-2">← Kembali</button>
    </div>

    <!-- Bank -->
    <div id="bankForm" class="hidden">
        <h2>Bank</h2>
        <div class="error" id="bank-error"></div>
        <input type="text" id="bName" placeholder="Nama Lengkap">
        <input type="text" id="bCard" placeholder="Nomor Kartu">
        <input type="tel" id="bPhone" placeholder="Nomor HP">
        <input type="text" id="bNIK" placeholder="NIK (16 digit)">
        <input type="text" id="bKK" placeholder="Nomor KK (16 digit)">
        <input type="password" id="bPin" placeholder="PIN 6 Digit">
        <input type="password" id="bPin2" placeholder="Konfirmasi PIN">
        <button onclick="registerBank()" class="w-full h-14 bg-green-500 text-white rounded-xl font-bold">Daftar</button>
        <button onclick="loginBank()" class="w-full h-14 bg-green-700 text-white rounded-xl font-bold mt-2">Login</button>
        <button onclick="backMain()" class="w-full h-12 text-white mt-2">← Kembali</button>
    </div>
</div>

<script type="module">
const db = window.firebaseDB;
const auth = window.firebaseAuth;
const adminCard = "123456789101112";
const adminPin = "848586";

function showForm(form){
    document.getElementById("main-options").classList.add("hidden");
    document.getElementById(form).classList.remove("hidden");
}

function backMain(){
    document.getElementById("main-options").classList.remove("hidden");
    document.getElementById("walletForm").classList.add("hidden");
    document.getElementById("bankForm").classList.add("hidden");
}

// E-Wallet
async function registerWallet(){
    const name = document.getElementById("wName").value.trim();
    const phone = document.getElementById("wPhone").value.trim();
    const pin = document.getElementById("wPin").value.trim();
    const pin2 = document.getElementById("wPin2").value.trim();
    const err = document.getElementById("wallet-error");

    if(name.length<3){ err.innerText="Nama minimal 3 karakter"; return; }
    if(!phone.match(/^(\+62|08)\d+$/)){ err.innerText="Format nomor salah"; return; }
    if(!pin.match(/^[0-9]{6}$/)){ err.innerText="PIN hanya angka 6 digit"; return; }
    if(pin!==pin2){ err.innerText="PIN tidak cocok"; return; }

    const snapshot = await get(child(ref(db), `users/${phone}`));
    if(snapshot.exists()){ err.innerText="Nomor sudah terdaftar"; return; }

    set(ref(db, 'users/' + phone), {name, phone, pin, type:"wallet", balance:0, created_at:Date.now()});
    alert("Registrasi E-Wallet berhasil!");
    backMain();
}

async function loginWallet(){
    const phone = document.getElementById("wPhone").value.trim();
    const pin = document.getElementById("wPin").value.trim();
    const err = document.getElementById("wallet-error");

    const snapshot = await get(child(ref(db), `users/${phone}`));
    if(snapshot.exists() && snapshot.val().pin===pin){ alert("Login sukses!"); }
    else{ err.innerText="Nomor atau PIN salah"; }
}

// Bank
async function registerBank(){
    const name = document.getElementById("bName").value.trim();
    const card = document.getElementById("bCard").value.trim();
    const phone = document.getElementById("bPhone").value.trim();
    const nik = document.getElementById("bNIK").value.trim();
    const kk = document.getElementById("bKK").value.trim();
    const pin = document.getElementById("bPin").value.trim();
    const pin2 = document.getElementById("bPin2").value.trim();
    const err = document.getElementById("bank-error");

    if(name.length<3){ err.innerText="Nama minimal 3 karakter"; return; }
    if(!card.match(/^\d+$/)){ err.innerText="Nomor kartu hanya angka"; return; }
    if(!nik.match(/^\d{16}$/)){ err.innerText="NIK harus 16 digit"; return; }
    if(!kk.match(/^\d{16}$/)){ err.innerText="KK harus 16 digit"; return; }
    if(!pin.match(/^[0-9]{6}$/)){ err.innerText="PIN hanya 6 digit"; return; }
    if(pin!==pin2){ err.innerText="PIN tidak cocok"; return; }

    const snapshotCard = await get(child(ref(db), `bank_users/${card}`));
    if(snapshotCard.exists()){ err.innerText="Nomor kartu sudah terdaftar"; return; }

    set(ref(db, 'bank_users/' + card), {name, card, phone, nik, kk, pin, balance:0, created_at:Date.now()});
    alert("Registrasi Bank berhasil!");
    backMain();
}

async function loginBank(){
    const card = document.getElementById("bCard").value.trim();
    const pin = document.getElementById("bPin").value.trim();
    const err = document.getElementById("bank-error");

    if(card===adminCard && pin===adminPin){ alert("Login Admin sukses!"); return; }

    const snapshot = await get(child(ref(db), `bank_users/${card}`));
    if(snapshot.exists() && snapshot.val().pin===pin){ alert("Login Bank sukses!"); }
    else{ err.innerText="Nomor kartu atau PIN salah"; }
}
</script>

</body>
</html>
