  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
            authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
            databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
            projectId: "rhf-shop-mafia-8d2e5",
            storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
            messagingSenderId: "158711184948",
            appId: "1:158711184948:web:9223f07fa6658601189461",
            measurementId: "G-R6KN1EYMB3"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // State Global
        let tempRegData = null;
        let generatedOTP = null;

        // --- Navigasi ---
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        };

        // --- Monitor Auth Status ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await loadDashboard(user.uid);
            } else {
                showPage('login-page');
            }
        });

        // --- Load Dashboard Data ---
        async function loadDashboard(uid) {
            let snap = await get(ref(db, `users/${uid}`));
            if (!snap.exists()) snap = await get(ref(db, `bank_users/${uid}`));
            
            if (snap.exists()) {
                const data = snap.val();
                document.getElementById('dash-name').innerText = data.name;
                document.getElementById('dash-balance').innerText = data.balance.toLocaleString('id-ID');
                document.getElementById('prof-name').innerText = data.name;
                document.getElementById('prof-phone').innerText = data.phone;
                showPage('dashboard-page');
            }
        }

        // --- Handler Registrasi E-Wallet ---
        window.handleWalletReg = async () => {
            const name = document.getElementById('w-name').value;
            const phone = document.getElementById('w-phone').value;
            const pin = document.getElementById('w-pin').value;
            const confirm = document.getElementById('w-pin-confirm').value;
            const err = document.getElementById('w-error');

            if (name.length < 3) return showError(err, "Nama minimal 3 karakter");
            if (!/^(\+62|08)[0-9]{8,13}$/.test(phone)) return showError(err, "Format nomor HP salah");
            if (!/^[0-9]{6}$/.test(pin)) return showError(err, "PIN hanya boleh angka dan harus 6 digit");
            if (pin !== confirm) return showError(err, "PIN tidak cocok");

            // Check duplicate phone
            const phoneQuery = query(ref(db, 'users'), orderByChild('phone'), equalTo(phone));
            const snap = await get(phoneQuery);
            if (snap.exists()) return showError(err, "Nomor sudah terdaftar");

            tempRegData = { name, phone, pin, type: 'wallet' };
            startOTP();
        };

        // --- Handler Registrasi Bank ---
        window.handleBankReg = async () => {
            const data = {
                name: document.getElementById('b-name').value,
                phone: document.getElementById('b-phone').value,
                email: document.getElementById('b-email').value,
                pin: document.getElementById('b-pin').value,
                confirm: document.getElementById('b-pin-confirm').value,
                nik: document.getElementById('b-nik').value,
                kk: document.getElementById('b-kk').value,
                type: 'bank'
            };
            const err = document.getElementById('b-error');

            if (data.name.length < 3) return showError(err, "Nama tidak valid");
            if (!data.email.includes('@')) return showError(err, "Email tidak valid");
            if (!/^[0-9]{6}$/.test(data.pin)) return showError(err, "PIN harus 6 digit angka");
            if (data.pin !== data.confirm) return showError(err, "PIN tidak cocok");
            if (data.nik.length !== 16 || data.kk.length !== 16) return showError(err, "NIK/KK harus 16 digit");

            // One Human One Account Check
            const nikSnap = await get(query(ref(db, 'bank_users'), orderByChild('nik'), equalTo(data.nik)));
            if (nikSnap.exists()) return showError(err, "NIK sudah terdaftar");
            
            const phoneSnap = await get(query(ref(db, 'bank_users'), orderByChild('phone'), equalTo(data.phone)));
            if (phoneSnap.exists()) return showError(err, "Nomor sudah terdaftar");

            tempRegData = data;
            startOTP();
        };

        // --- OTP Logic ---
        function startOTP() {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('simulated-otp').innerText = generatedOTP;
            showPage('otp-page');
        }

        window.verifyOTP = async () => {
            const input = document.getElementById('otp-input').value;
            const err = document.getElementById('otp-error');

            if (input === generatedOTP) {
                try {
                    const email = tempRegData.email || `${tempRegData.phone}@rhf.com`;
                    const userCredential = await createUserWithEmailAndPassword(auth, email, tempRegData.pin + "0000");
                    const uid = userCredential.user.uid;

                    const path = tempRegData.type === 'wallet' ? `users/${uid}` : `bank_users/${uid}`;
                    const payload = {
                        uid,
                        name: tempRegData.name,
                        phone: tempRegData.phone,
                        type: tempRegData.type,
                        balance: 0,
                        created_at: new Date().toISOString()
                    };

                    if (tempRegData.type === 'bank') {
                        payload.email = tempRegData.email;
                        payload.nik = tempRegData.nik;
                        payload.kk = tempRegData.kk;
                        payload.verified = true;
                    }

                    await set(ref(db, path), payload);
                    // Auth state monitor will handle redirect to dashboard
                } catch (e) {
                    alert("Error: " + e.message);
                }
            } else {
                err.classList.remove('hidden');
            }
        };

        window.logout = () => {
            signOut(auth).then(() => {
                location.reload();
            });
        };

        function showError(el, msg) {
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
