<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamWallet - Login</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #001a00, #003300);
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(0, 51, 0, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 255, 80, 0.25);
        }
        h1 { margin: 0 0 8px; font-size: 32px; color: #00ff88; letter-spacing: 2px; }
        p { margin: 0 0 30px; opacity: 0.9; font-size: 15px; }
        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            background: #002200;
            color: white;
            text-align: center;
            letter-spacing: 3px;
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: #00cc00;
            color: black;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .link { color: #88ffaa; margin-top: 25px; display: block; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JamWallet</h1>
        <p>Masukkan Nomor Kartu & Password</p>
        
        <input type="text" id="card" placeholder="527341 123456 7890" maxlength="25" onkeyup="formatCard(this)">
        <input type="password" id="pass" placeholder="Password 6 Digit" maxlength="6">
        
        <button onclick="login()">MASUK</button>
        <a href="admin.html" class="link">Admin Panel</a>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
          authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
          databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
          projectId: "rhf-shop-mafia-8d2e5",
          storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
          messagingSenderId: "158711184948",
          appId: "1:158711184948:web:9223f07fa6658601189461",
          measurementId: "G-R6KN1EYMB3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Format nomor kartu otomatis dengan spasi (6-6-4)
        window.formatCard = function(input) {
            let val = input.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let formatted = '';
            if (val.length > 0) formatted += val.substring(0,6);
            if (val.length > 6) formatted += ' ' + val.substring(6,12);
            if (val.length > 12) formatted += ' ' + val.substring(12,16);
            input.value = formatted.trim();
        };

        window.login = async function() {
            let cardFormatted = document.getElementById('card').value.trim();
            let card = cardFormatted.replace(/\s+/g, ''); // hapus spasi untuk simpan di DB
            let pass = document.getElementById('pass').value.trim();

            if (!card.startsWith("527341")) return alert("Nomor kartu harus diawali 527341");
            if (pass.length !== 6) return alert("Password harus 6 digit angka");

            const snap = await db.ref('users/' + card).once('value');
            const user = snap.val();

            if (!user || user.password !== pass) {
                return alert("Nomor kartu atau password salah!");
            }

            localStorage.setItem('currentCard', card);
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
