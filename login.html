<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet - Login & Registrasi</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-attachment: fixed;
}
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 2rem;
    padding: 30px 25px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    max-width: 400px;
    width: 100%;
    text-align: center;
}
button {
    transition: all 0.3s ease;
}
button:hover { transform: translateY(-2px); }
.hidden { display: none; }
input:focus { outline: none; box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="card">
    <h1 class="text-white text-3xl font-bold mb-6">RHF WALLET</h1>

    <!-- Pilihan utama -->
    <div id="main-options" class="space-y-4">
        <button onclick="selectForm('loginWallet')" class="w-full py-4 rounded-xl text-white font-bold text-lg bg-emerald-500">Login E-Wallet</button>
        <button onclick="selectForm('registerWallet')" class="w-full py-4 rounded-xl text-white font-bold text-lg bg-emerald-600">Registrasi E-Wallet</button>
        <button onclick="selectForm('loginBank')" class="w-full py-4 rounded-xl text-white font-bold text-lg bg-blue-500">Login Bank</button>
        <button onclick="selectForm('registerBank')" class="w-full py-4 rounded-xl text-white font-bold text-lg bg-blue-600">Registrasi Bank</button>
    </div>

    <!-- Form -->
    <div id="form-container" class="hidden mt-6 text-left">
        <h2 id="form-title" class="text-white text-xl font-semibold mb-4"></h2>

        <!-- Nama Lengkap -->
        <div id="field-name" class="mb-3 hidden">
            <label class="text-white text-sm mb-1 block">Nama Lengkap</label>
            <input id="name" type="text" class="w-full rounded-xl px-4 py-3" placeholder="Nama Lengkap">
        </div>

        <!-- Nomor HP / Kartu -->
        <div class="mb-3">
            <label id="label-phone" class="text-white text-sm mb-1 block">Nomor HP / Kartu</label>
            <input id="cardOrPhone" type="text" class="w-full rounded-xl px-4 py-3" placeholder="Masukkan nomor">
        </div>

        <!-- PIN -->
        <div class="mb-3">
            <label class="text-white text-sm mb-1 block">PIN (6 digit angka)</label>
            <input id="pin" type="password" class="w-full rounded-xl px-4 py-3" maxlength="6" placeholder="******">
        </div>

        <button onclick="submitForm()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-semibold mt-2 mb-2">Kirim</button>

        <p id="error-msg" class="text-red-400 mt-2 text-sm"></p>
        <button onclick="backToMain()" class="text-white text-sm mt-1 underline">Kembali</button>
    </div>
</div>

<script>
let currentForm = null;
const ADMIN_CARD = "123456789101112";
const ADMIN_PIN = "848586";

function selectForm(form){
    currentForm = form;
    document.getElementById('main-options').classList.add('hidden');
    document.getElementById('form-container').classList.remove('hidden');

    const formTitle = document.getElementById('form-title');
    const fieldName = document.getElementById('field-name');
    const labelPhone = document.getElementById('label-phone');

    fieldName.classList.add('hidden');

    if(form === 'loginWallet'){
        formTitle.innerText = "Login E-Wallet";
        labelPhone.innerText = "Nomor HP";
    } else if(form === 'registerWallet'){
        formTitle.innerText = "Registrasi E-Wallet";
        fieldName.classList.remove('hidden');
        labelPhone.innerText = "Nomor HP";
    } else if(form === 'loginBank'){
        formTitle.innerText = "Login Bank";
        labelPhone.innerText = "Nomor Kartu";
    } else if(form === 'registerBank'){
        formTitle.innerText = "Registrasi Bank";
        fieldName.classList.remove('hidden');
        labelPhone.innerText = "Nomor Kartu";
    }
}

function backToMain(){
    document.getElementById('form-container').classList.add('hidden');
    document.getElementById('main-options').classList.remove('hidden');
    document.getElementById('error-msg').innerText = "";
}

function submitForm(){
    const name = document.getElementById('name').value.trim();
    const cardOrPhone = document.getElementById('cardOrPhone').value.trim();
    const pin = document.getElementById('pin').value.trim();
    const errorMsg = document.getElementById('error-msg');
    errorMsg.innerText = "";

    // Validasi PIN
    if(!/^[0-9]{6}$/.test(pin)){
        errorMsg.innerText = "PIN hanya boleh angka dan harus 6 digit";
        return;
    }

    // Validasi nama untuk registrasi
    if(currentForm === 'registerWallet' || currentForm === 'registerBank'){
        if(name.length < 3){
            errorMsg.innerText = "Nama minimal 3 karakter";
            return;
        }
    }

    // Admin login tersembunyi
    if(cardOrPhone === ADMIN_CARD && pin === ADMIN_PIN){
        window.location.href = "admin.html";
        return;
    }

    // Simulasi login/register user biasa
    window.location.href = "index.html";
}
</script>

</body>
</html>
