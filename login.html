<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Wallet - Login/Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg,#4f46e5,#3b82f6); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:white; border-radius:2rem; padding:2rem; max-width:400px; width:100%; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
input { border:1px solid #ccc; border-radius:1rem; padding:0.75rem 1rem; width:100%; margin-top:0.5rem; }
button { width:100%; padding:1rem; margin-top:1rem; border-radius:1.25rem; font-weight:bold; font-size:1.1rem; }
.error { color:red; margin-top:0.5rem; font-size:0.9rem; }
</style>
</head>
<body>

<div class="card">
  <h1 class="text-center text-2xl font-bold mb-6">RHF WALLET</h1>

  <!-- TOMBOL UTAMA -->
  <div class="grid gap-4 mb-6">
    <button onclick="showLoginWallet()" class="bg-blue-500 text-white">Login E-Wallet</button>
    <button onclick="showLoginBank()" class="bg-green-500 text-white">Login Bank</button>
    <button onclick="showRegisterWallet()" class="bg-indigo-500 text-white">Register E-Wallet</button>
    <button onclick="showRegisterBank()" class="bg-purple-500 text-white">Register Bank</button>
  </div>

  <!-- LOGIN E-WALLET -->
  <div id="login-wallet" class="hidden">
    <h2 class="font-semibold mb-2">Login E-Wallet</h2>
    <input type="text" id="login-wallet-card" placeholder="Nomor Kartu / HP" />
    <input type="password" id="login-wallet-pin" placeholder="PIN (6 digit angka)" maxlength="6"/>
    <div class="error" id="login-wallet-error"></div>
    <button onclick="loginWallet()">Login</button>
    <button onclick="backMain()" class="mt-2 bg-gray-300 text-black">Kembali</button>
  </div>

  <!-- LOGIN BANK -->
  <div id="login-bank" class="hidden">
    <h2 class="font-semibold mb-2">Login Bank</h2>
    <input type="text" id="login-bank-card" placeholder="Nomor Kartu / HP" />
    <input type="password" id="login-bank-pin" placeholder="PIN (6 digit angka)" maxlength="6"/>
    <div class="error" id="login-bank-error"></div>
    <button onclick="loginBank()">Login</button>
    <button onclick="backMain()" class="mt-2 bg-gray-300 text-black">Kembali</button>
  </div>

  <!-- REGISTER E-WALLET -->
  <div id="register-wallet" class="hidden">
    <h2 class="font-semibold mb-2">Register E-Wallet</h2>
    <input type="text" id="reg-wallet-name" placeholder="Nama Lengkap"/>
    <input type="text" id="reg-wallet-phone" placeholder="Nomor HP"/>
    <input type="password" id="reg-wallet-pin" placeholder="PIN (6 digit angka)" maxlength="6"/>
    <input type="password" id="reg-wallet-pin2" placeholder="Konfirmasi PIN" maxlength="6"/>
    <div class="error" id="reg-wallet-error"></div>
    <button onclick="registerWallet()">Register</button>
    <button onclick="backMain()" class="mt-2 bg-gray-300 text-black">Kembali</button>
  </div>

  <!-- REGISTER BANK -->
  <div id="register-bank" class="hidden">
    <h2 class="font-semibold mb-2">Register Bank</h2>
    <input type="text" id="reg-bank-name" placeholder="Nama Lengkap"/>
    <input type="text" id="reg-bank-phone" placeholder="Nomor HP"/>
    <input type="email" id="reg-bank-email" placeholder="Email"/>
    <input type="password" id="reg-bank-pin" placeholder="PIN (6 digit angka)" maxlength="6"/>
    <input type="password" id="reg-bank-pin2" placeholder="Konfirmasi PIN" maxlength="6"/>
    <input type="text" id="reg-bank-nik" placeholder="Nomor KTP (16 digit)" maxlength="16"/>
    <div class="error" id="reg-bank-error"></div>
    <button onclick="registerBank()">Register</button>
    <button onclick="backMain()" class="mt-2 bg-gray-300 text-black">Kembali</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
  authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
  databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
  projectId: "rhf-shop-mafia-8d2e5",
  storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
  messagingSenderId: "158711184948",
  appId: "1:158711184948:web:9223f07fa6658601189461",
  measurementId: "G-R6KN1EYMB3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Admin rahasia
const adminCard = "123456789101112";
const adminPin = "848586";

// Fungsi UI
function hideAll() {
  ['login-wallet','login-bank','register-wallet','register-bank'].forEach(id=>document.getElementById(id).classList.add('hidden'));
}
function showLoginWallet(){ hideAll(); document.getElementById('login-wallet').classList.remove('hidden'); }
function showLoginBank(){ hideAll(); document.getElementById('login-bank').classList.remove('hidden'); }
function showRegisterWallet(){ hideAll(); document.getElementById('register-wallet').classList.remove('hidden'); }
function showRegisterBank(){ hideAll(); document.getElementById('register-bank').classList.remove('hidden'); }
function backMain(){ hideAll(); }

// Fungsi login E-Wallet
window.loginWallet = async function(){
  const card = document.getElementById('login-wallet-card').value;
  const pin = document.getElementById('login-wallet-pin').value;
  const err = document.getElementById('login-wallet-error');
  err.textContent = '';

  if(card===adminCard && pin===adminPin){
    window.location.href='admin.html';
    return;
  }

  if(!/^\d{6}$/.test(pin)){ err.textContent='PIN harus 6 digit angka'; return; }

  try{
    const snap = await get(child(ref(db), `users`));
    const users = snap.val();
    let found=false;
    for(let uid in users){
      if(users[uid].phone===card && users[uid].pin===pin){
        found=true; break;
      }
    }
    if(found) window.location.href='index.html';
    else err.textContent='Nomor atau PIN salah';
  } catch(e){ err.textContent='Error login'; }
}

// Fungsi login Bank
window.loginBank = async function(){
  const card = document.getElementById('login-bank-card').value;
  const pin = document.getElementById('login-bank-pin').value;
  const err = document.getElementById('login-bank-error');
  err.textContent = '';

  if(card===adminCard && pin===adminPin){
    window.location.href='admin.html';
    return;
  }

  if(!/^\d{6}$/.test(pin)){ err.textContent='PIN harus 6 digit angka'; return; }

  try{
    const snap = await get(child(ref(db), `bank_users`));
    const banks = snap.val();
    let found=false;
    for(let uid in banks){
      if(banks[uid].card===card && banks[uid].pin===pin){
        found=true; break;
      }
    }
    if(found) window.location.href='index.html';
    else err.textContent='Nomor atau PIN salah';
  } catch(e){ err.textContent='Error login'; }
}

// Fungsi register E-Wallet
window.registerWallet = async function(){
  const name=document.getElementById('reg-wallet-name').value.trim();
  const phone=document.getElementById('reg-wallet-phone').value.trim();
  const pin=document.getElementById('reg-wallet-pin').value;
  const pin2=document.getElementById('reg-wallet-pin2').value;
  const err=document.getElementById('reg-wallet-error');
  err.textContent='';

  if(name.length<3){ err.textContent='Nama minimal 3 karakter'; return; }
  if(!/^\d{6}$/.test(pin)){ err.textContent='PIN harus 6 digit angka'; return; }
  if(pin!==pin2){ err.textContent='PIN tidak cocok'; return; }

  try{
    const snap = await get(child(ref(db), `users`));
    const users = snap.val()||{};
    for(let uid in users){ if(users[uid].phone===phone){ err.textContent='Nomor sudah terdaftar'; return; } }
    const newUid = push(ref(db,'users')).key;
    await set(ref(db,`users/${newUid}`),{name,phone,pin,type:'wallet',balance:0,created_at:Date.now()});
    alert('Registrasi E-Wallet berhasil!');
    backMain();
  }catch(e){ err.textContent='Error registrasi'; }
}

// Fungsi register Bank
window.registerBank = async function(){
  const name=document.getElementById('reg-bank-name').value.trim();
  const phone=document.getElementById('reg-bank-phone').value.trim();
  const email=document.getElementById('reg-bank-email').value.trim();
  const pin=document.getElementById('reg-bank-pin').value;
  const pin2=document.getElementById('reg-bank-pin2').value;
  const nik=document.getElementById('reg-bank-nik').value.trim();
  const err=document.getElementById('reg-bank-error');
  err.textContent='';

  if(name.length<3){ err.textContent='Nama minimal 3 karakter'; return; }
  if(!/^\d{6}$/.test(pin)){ err.textContent='PIN harus 6 digit angka'; return; }
  if(pin!==pin2){ err.textContent='PIN tidak cocok'; return; }
  if(!/^\d{16}$/.test(nik)){ err.textContent='NIK harus 16 digit angka'; return; }

  try{
    const snap = await get(child(ref(db), `bank_users`));
    const banks = snap.val()||{};
    for(let uid in banks){ 
      if(banks[uid].phone===phone){ err.textContent='Nomor sudah terdaftar'; return; }
      if(banks[uid].nik===nik){ err.textContent='NIK sudah terdaftar'; return; }
    }
    const newUid = push(ref(db,'bank_users')).key;
    await set(ref(db,`bank_users/${newUid}`),{name,phone,email,pin,nik,balance:0,created_at:Date.now()});
    alert('Registrasi Bank berhasil!');
    backMain();
  }catch(e){ err.textContent='Error registrasi'; }
}
</script>

</body>
</html>
