<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamWallet - Wallet</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin:0; background:linear-gradient(135deg,#0a1f0a,#001a00); color:white; font-family:Arial,sans-serif; text-align:center; padding:20px; }
        .balance { font-size:42px; font-weight:700; margin:30px 0; color:#00ff88; }
        button { padding:15px 30px; font-size:18px; background:#00cc00; color:black; border:none; border-radius:15px; margin:10px; cursor:pointer; }
        .history { margin-top:30px; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; text-align:left; }
    </style>
</head>
<body>
    <h2>Saldo Kartu <span id="card-display"></span></h2>
    <div class="balance" id="saldo">Rp 0</div>
    
    <button onclick="topUp()">Top Up</button>
    <button onclick="kirimUang()">Kirim Uang</button>
    <button onclick="logout()" style="background:#ff4444;">Keluar</button>

    <div class="history">
        <h3>Riwayat Transaksi</h3>
        <div id="history-list"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
          authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
          databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
          projectId: "rhf-shop-mafia-8d2e5",
          storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
          messagingSenderId: "158711184948",
          appId: "1:158711184948:web:9223f07fa6658601189461",
          measurementId: "G-R6KN1EYMB3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const currentCard = localStorage.getItem('currentCard');
        if (!currentCard) window.location.href = "login.html";

        document.getElementById('card-display').textContent = currentCard;

        let currentSaldo = 0;

        db.ref('users/' + currentCard + '/saldo').on('value', snap => {
            currentSaldo = snap.val() || 0;
            document.getElementById('saldo').textContent = 'Rp ' + currentSaldo.toLocaleString('id-ID');
        });

        function loadHistory() {
            db.ref('transactions/' + currentCard).orderByChild('waktu').limitToLast(20).on('value', snap => {
                const el = document.getElementById('history-list');
                el.innerHTML = '';
                snap.forEach(child => {
                    const t = child.val();
                    const d = document.createElement('div');
                    d.style.padding = '10px 0';
                    d.style.borderBottom = '1px solid #555';
                    d.innerHTML = `<strong>\( {t.keterangan}</strong><br><small> \){new Date(t.waktu).toLocaleString('id-ID')}</small><br><span style="color:\( {t.jenis==='Top Up'?'#00ff00':'#ff4444'}"> \){t.jenis==='Top Up' ? '+' : '-'} Rp ${t.nominal.toLocaleString('id-ID')}</span>`;
                    el.appendChild(d);
                });
            });
        }
        loadHistory();

        window.topUp = function() {
            const amt = parseInt(prompt("Nominal Top Up (Rp):", "100000"));
            if (!amt || amt < 1000) return alert("Minimal Rp 1.000");
            db.ref('users/' + currentCard + '/saldo').set(currentSaldo + amt);
            db.ref('transactions/' + currentCard).push({jenis:"Top Up", nominal:amt, keterangan:"Top Up Saldo", waktu:Date.now()});
        };

        window.kirimUang = function() {
            const amt = parseInt(prompt("Nominal Kirim (Rp):", "50000"));
            const tujuan = prompt("Kirim ke:", "Teman");
            if (!amt || amt < 1000) return alert("Minimal Rp 1.000");
            if (amt > currentSaldo) return alert("Saldo tidak cukup!");
            db.ref('users/' + currentCard + '/saldo').set(currentSaldo - amt);
            db.ref('transactions/' + currentCard).push({jenis:"Kirim", nominal:amt, keterangan:"Kirim ke " + tujuan, waktu:Date.now()});
        };

        window.logout = function() {
            localStorage.removeItem('currentCard');
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
