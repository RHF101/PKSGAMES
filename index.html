<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation 3 Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #001f3f, #000000);
            color: white;
            font-family: 'Arial Black', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .ps-logo {
            font-size: 70px;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 30px #00aaff, 0 0 60px #00aaff;
            margin-bottom: 40px;
            color: #00ccff;
        }
        .xmb {
            display: flex;
            justify-content: center;
            gap: 50px;
            position: absolute;
            bottom: 80px;
            width: 100%;
        }
        .category {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 10px;
        }
        .category.active {
            transform: scale(1.3);
            filter: brightness(1.5);
        }
        .icon {
            font-size: 90px;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 15px #fff;
        }
        .label {
            font-size: 22px;
            font-weight: bold;
        }
        .content {
            text-align: center;
            max-width: 600px;
            margin-top: -100px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            border: 2px solid #00aaff;
        }
    </style>
</head>
<body>
    <div class="ps-logo">PLAYSTATION 3</div>
    
    <div class="content" id="content">
        <h1>Selamat Datang di XMB</h1>
        <p>Gunakan ← → atau klik menu di bawah.<br>Tekan Enter untuk pilih!</p>
    </div>

    <div class="xmb" id="xmb">
        <div class="category active" data-index="0" onclick="select(0)">
            <span class="icon">🎮</span>
            <span class="label">Game</span>
        </div>
        <div class="category" data-index="1" onclick="select(1)">
            <span class="icon">🎵</span>
            <span class="label">Music</span>
        </div>
        <div class="category" data-index="2" onclick="select(2)">
            <span class="icon">🎥</span>
            <span class="label">Video</span>
        </div>
        <div class="category" data-index="3" onclick="select(3)">
            <span class="icon">📺</span>
            <span class="label">TV</span>
        </div>
        <div class="category" data-index="4" onclick="select(4)">
            <span class="icon">🌐</span>
            <span class="label">Internet</span>
        </div>
    </div>

    <script>
        let index = 0;
        const cats = document.querySelectorAll('.category');
        const contentDiv = document.getElementById('content');

        function select(i) {
            cats.forEach(c => c.classList.remove('active'));
            cats[i].classList.add('active');
            index = i;
            
            const texts = [
                `<h1>🎮 GAME</h1><p>God of War • Gran Turismo • LittleBigPlanet</p>`,
                `<h1>🎵 MUSIC</h1><p>Putar lagu dari USB atau Spotify!</p>`,
                `<h1>🎥 VIDEO</h1><p>Blu-ray • MKV • Folder Video</p>`,
                `<h1>📺 TV</h1><p>Live TV &amp; Streaming</p>`,
                `<h1>🌐 INTERNET</h1><p>Browser PS3</p>`
            ];
            contentDiv.innerHTML = texts[i];
        }

        // Keyboard (panah kiri/kanan + Enter) seperti controller PS3
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') {
                index = (index + 1) % 5;
                select(index);
            }
            if (e.key === 'ArrowLeft') {
                index = (index - 1 + 5) % 5;
                select(index);
            }
            if (e.key === 'Enter') {
                alert(`Kamu membuka: ${cats[index].querySelector('.label').textContent} 🔥`);
            }
        });

        // Mulai dari Game
        select(0);
    </script>
</body>
  </html>
