<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .balance { font-size: 2.75rem; font-weight: 700; letter-spacing: -2px; }
    </style>
</head>
<body class="bg-zinc-100 min-h-screen pb-20">

<div class="max-w-lg mx-auto bg-white min-h-screen shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 pt-12 pb-8">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white text-blue-600 rounded-3xl flex items-center justify-center text-3xl font-bold">R</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter">RHF Wallet</h1>
                </div>
            </div>
            <div class="flex gap-5 text-2xl">
                <i class="fas fa-bell"></i>
                <i class="fas fa-envelope"></i>
            </div>
        </div>

        <!-- BALANCE -->
        <div class="mt-10 bg-white/10 backdrop-blur-2xl rounded-3xl p-6">
            <div class="flex justify-between">
                <div>
                    <p class="text-blue-100 text-sm">Saldo Utama</p>
                    <div id="balance-display" class="balance text-white">Rp 2.450.000</div>
                    <div id="balance-hidden" class="hidden text-5xl text-white/30 tracking-widest">••••••</div>
                </div>
                <div>
                    <button onclick="toggleBalance()" id="eye-btn" class="text-3xl"><i class="fas fa-eye"></i></button>
                    <div class="text-xs bg-white/20 px-4 py-1 rounded-2xl mt-8">Standard</div>
                </div>
            </div>
            <div class="text-xs text-blue-100 mt-4">527341 1234 5678 9012</div>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="grid grid-cols-4 gap-4 px-6 -mt-8 relative z-10">
        <div onclick="showSendModal()" class="bg-white rounded-3xl p-5 text-center shadow-xl">
            <i class="fas fa-paper-plane text-4xl text-blue-600"></i>
            <p class="text-xs mt-2 font-medium">Kirim</p>
        </div>
        <div onclick="topUp()" class="bg-white rounded-3xl p-5 text-center shadow-xl">
            <i class="fas fa-plus text-4xl text-emerald-600"></i>
            <p class="text-xs mt-2 font-medium">Top Up</p>
        </div>
        <div onclick="showQRModal()" class="bg-white rounded-3xl p-5 text-center shadow-xl">
            <i class="fas fa-qrcode text-4xl text-purple-600"></i>
            <p class="text-xs mt-2 font-medium">QRIS</p>
        </div>
        <div onclick="alert('Tarik Tunai akan segera hadir')" class="bg-white rounded-3xl p-5 text-center shadow-xl">
            <i class="fas fa-wallet text-4xl text-amber-600"></i>
            <p class="text-xs mt-2 font-medium">Tarik</p>
        </div>
    </div>

    <!-- FEATURE GRID (25+ features) -->
    <div class="px-6 mt-12">
        <h3 class="text-zinc-500 text-sm font-medium mb-4">Semua Layanan</h3>
        <div id="feature-grid" class="grid grid-cols-4 gap-6"></div>
    </div>

    <!-- TRANSACTION HISTORY -->
    <div class="px-6 mt-12">
        <h3 class="text-zinc-700 font-semibold mb-4">Riwayat Terbaru</h3>
        <div id="history" class="space-y-4"></div>
    </div>

    <!-- MESSAGES -->
    <div class="px-6 mt-12 mb-8">
        <h3 class="text-zinc-700 font-semibold mb-4">Pesan dari Admin</h3>
        <div id="messages" class="bg-white rounded-3xl p-6 shadow"></div>
    </div>

</div>

<!-- SEND MODAL -->
<div id="send-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-50">
    <div class="bg-white w-full rounded-t-3xl p-8">
        <h3 class="text-2xl font-bold mb-6">Kirim Uang</h3>
        <input id="send-to" placeholder="Nomor HP / Kartu" class="w-full border rounded-2xl px-6 py-5 text-lg mb-4">
        <input id="send-amount" type="number" placeholder="Nominal" class="w-full border rounded-2xl px-6 py-5 text-3xl">
        <button onclick="doSend()" class="mt-8 w-full bg-blue-600 text-white py-5 rounded-2xl text-lg font-semibold">Kirim Sekarang</button>
    </div>
</div>

<!-- QR MODAL -->
<div id="qr-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl text-center w-80">
        <h3 class="text-xl font-bold mb-4">QRIS RHF Wallet</h3>
        <div class="mx-auto w-64 h-64 bg-zinc-100 rounded-3xl flex items-center justify-center text-8xl border-4 border-dashed">📱</div>
        <button onclick="hideQRModal()" class="mt-8 w-full py-4 border rounded-2xl">Tutup</button>
    </div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
  authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
  databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
  projectId: "rhf-shop-mafia-8d2e5",
  storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
  messagingSenderId: "158711184948",
  appId: "1:158711184948:web:9223f07fa6658601189461",
  measurementId: "G-R6KN1EYMB3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Demo user (ganti sesuai kartu yang kamu buat di admin)
const currentCard = "5273411234567890";

// ==================== BALANCE & REAL-TIME ====================
let balanceVisible = true;
db.ref('users/' + currentCard + '/balance').on('value', snap => {
    const bal = snap.val() || 0;
    document.getElementById('balance-display').textContent = 'Rp ' + bal.toLocaleString('id-ID');
});

function toggleBalance() {
    balanceVisible = !balanceVisible;
    // ... (logic hide/show seperti sebelumnya)
}

// ==================== FEATURE GRID (25 features) ====================
const features = [
    {icon:"fas fa-paper-plane", name:"Kirim Uang"},
    {icon:"fas fa-hand-holding-dollar", name:"Minta Uang"},
    {icon:"fas fa-qrcode", name:"QRIS"},
    {icon:"fas fa-camera", name:"Scan QR"},
    {icon:"fas fa-plus-circle", name:"Top Up"},
    {icon:"fas fa-arrow-down", name:"Tarik Tunai"},
    {icon:"fas fa-bank", name:"Transfer Bank"},
    {icon:"fas fa-mobile-alt", name:"Pulsa"},
    {icon:"fas fa-wifi", name:"Internet"},
    {icon:"fas fa-bolt", name:"Listrik"},
    {icon:"fas fa-receipt", name:"Tagihan"},
    {icon:"fas fa-gift", name:"Rewards"},
    {icon:"fas fa-star", name:"Cashback"},
    {icon:"fas fa-ticket-alt", name:"Voucher"},
    {icon:"fas fa-users", name:"Invite Teman"},
    {icon:"fas fa-credit-card", name:"Kartu Bank"},
    {icon:"fas fa-history", name:"Riwayat"},
    {icon:"fas fa-bell", name:"Notifikasi"},
    {icon:"fas fa-envelope", name:"Pesan"},
    {icon:"fas fa-shield-alt", name:"Keamanan"},
    {icon:"fas fa-user", name:"Profil"},
    {icon:"fas fa-headset", name:"Support"},
    {icon:"fas fa-chart-line", name:"Investasi"},
    {icon:"fas fa-car", name:"Asuransi"},
    {icon:"fas fa-donate", name:"Donasi"}
];

let html = '';
features.forEach(f => {
    html += `
    <div onclick="featureClick('${f.name}')" class="bg-white rounded-3xl p-5 text-center shadow hover:shadow-xl transition-all">
        <i class="${f.icon} text-4xl text-blue-600 mb-3"></i>
        <p class="text-xs font-medium">${f.name}</p>
    </div>`;
});
document.getElementById('feature-grid').innerHTML = html;

function featureClick(name) {
    if (name === "Kirim Uang") showSendModal();
    else if (name === "QRIS") showQRModal();
    else alert(name + " dibuka (demo)");
}

// ==================== TRANSACTION HISTORY (real-time) ====================
db.ref('transactions/' + currentCard).orderByChild('date').limitToLast(10).on('value', snap => {
    let str = '';
    snap.forEach(child => {
        const t = child.val();
        str += `
        <div class="bg-white p-5 rounded-3xl flex justify-between shadow-sm">
            <div>
                <p class="font-medium">${t.desc}</p>
                <p class="text-xs text-zinc-400">${new Date(t.date).toLocaleDateString('id-ID')}</p>
            </div>
            <div class="text-right">
                <p class="${t.type === 'credit' ? 'text-emerald-600' : 'text-red-500'} font-bold">
                    ${t.type === 'credit' ? '+' : '-'} Rp ${t.amount.toLocaleString('id-ID')}
                </p>
            </div>
        </div>`;
    });
    document.getElementById('history').innerHTML = str || '<p class="text-zinc-400">Belum ada transaksi</p>';
});

// ==================== MESSAGES (real-time from admin) ====================
db.ref('messages/' + currentCard).on('value', snap => {
    let str = '<div class="space-y-3">';
    snap.forEach(child => {
        const m = child.val();
        str += `<div class="bg-blue-50 p-4 rounded-2xl"><p class="text-sm">\( {m.message}</p><p class="text-xs text-zinc-400 mt-2"> \){new Date(m.date).toLocaleString('id-ID')}</p></div>`;
    });
    str += '</div>';
    document.getElementById('messages').innerHTML = str;
});

// ==================== MODALS & FUNCTIONS ====================
function showSendModal() { document.getElementById('send-modal').classList.remove('hidden'); }
function hideSendModal() { document.getElementById('send-modal').classList.add('hidden'); }
function doSend() {
    const amt = parseInt(document.getElementById('send-amount').value);
    if (!amt) return alert("Masukkan nominal");
    db.ref('transactions/' + currentCard).push({
        desc: "Kirim ke user lain",
        amount: amt,
        type: "debit",
        date: Date.now()
    });
    hideSendModal();
    alert("Transfer berhasil!");
}
function showQRModal() { document.getElementById('qr-modal').classList.remove('hidden'); }
function hideQRModal() { document.getElementById('qr-modal').classList.add('hidden'); }
function topUp() {
    const amt = prompt("Nominal Top Up (Rp):", "100000");
    if (amt) {
        db.ref('users/' + currentCard + '/balance').set((parseInt(document.getElementById('balance-display').textContent.replace(/[^0-9]/g,'')) || 0) + parseInt(amt));
    }
}

// Init
window.onload = () => {
    // Create demo data if empty
    db.ref('users/' + currentCard).once('value', snap => {
        if (!snap.exists()) {
            db.ref('users/' + currentCard).set({ balance: 2450000, cardClass: "Standard" });
        }
    });
};
</script>
</body>
</html>
