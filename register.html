<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamWallet - Register Kartu</title>
    <style>
        body { margin:0; background:linear-gradient(135deg,#0a1f0a,#001a00); color:white; font-family:Arial,sans-serif; text-align:center; padding:40px 20px; }
        input { padding:15px; width:90%; max-width:400px; margin:15px 0; font-size:18px; border-radius:10px; border:none; }
        button { padding:15px 30px; font-size:18px; background:#00cc00; color:black; border:none; border-radius:15px; margin:10px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Register Kartu Baru</h1>
    <input type="text" id="new-card" placeholder="Nomor Kartu ATM">
    <input type="number" id="saldo-awal" placeholder="Saldo Awal (Rp)" value="0">
    <br><br>
    <button onclick="registerCard()">DAFTARKAN KARTU</button>
    <p><a href="login.html" style="color:#88ffaa;">← Kembali ke Login</a></p>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
          authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
          databaseURL: "https://rhf-shop-mafia-8d2e5-default-rtdb.firebaseio.com",
          projectId: "rhf-shop-mafia-8d2e5",
          storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
          messagingSenderId: "158711184948",
          appId: "1:158711184948:web:9223f07fa6658601189461",
          measurementId: "G-R6KN1EYMB3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.registerCard = async function() {
            const cardNo = document.getElementById('new-card').value.trim();
            const saldo = parseInt(document.getElementById('saldo-awal').value) || 0;

            if (!cardNo || cardNo.length < 8) return alert("Nomor kartu minimal 8 digit!");

            // Cek apakah kartu sudah ada
            const snap = await db.ref('cards/' + cardNo).once('value');
            if (snap.exists()) return alert("Kartu sudah terdaftar!");

            await db.ref('cards/' + cardNo).set({ nomor: cardNo, status: "aktif" });
            await db.ref('users/' + cardNo).set({ saldo: saldo });

            alert("Kartu berhasil didaftarkan! Silakan login.");
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
